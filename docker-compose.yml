# ModelProxy Demo - Docker Compose
#
# 使用：
#   docker compose up -d        # 启动
#   docker compose logs -f      # 查看日志
#   docker compose down         # 停止
#   docker compose up -d --build # 改了代码后重新构建
#
# 启动后访问：
#   http://localhost:8088            -> 自动跳转到 /demo/index.html
#   http://localhost:8088/demo/      -> 入口门厅
#   http://localhost:8088/PRD/       -> PRD 原始 Markdown 目录
#
# 局域网访问：把 localhost 换成本机 IP（如 http://10.141.32.112:8088）
#
# 内网 PyPI 源（分发 relay-bot wheel）：
#   启动后，目标机器安装 bot：
#   pip install --index-url http://本机IP:9080/simple/ --trusted-host 本机IP feishu-relay-bot
#
#   升级 bot（新 wheel 放入 relay_bot/dist/ 后）：
#   pip install -U --index-url http://本机IP:9080/simple/ --trusted-host 本机IP feishu-relay-bot
#

services:
  modelproxy-demo:
    build:
      context: .
      dockerfile: Dockerfile
    image: modelproxy-demo:1.0.0
    container_name: modelproxy-demo
    restart: unless-stopped

    ports:
      - "${HOST_PORT:-8088}:80"

    # 开发模式下可挂载本地文件实时编辑（取消注释即可）
    # volumes:
    #   - ./demo:/usr/share/nginx/html/demo:ro
    #   - ./PRD:/usr/share/nginx/html/PRD:ro
    #   - ./API.md:/usr/share/nginx/html/API.md:ro
    #   - ./资源池切分方案.md:/usr/share/nginx/html/资源池切分方案.md:ro

    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

    labels:
      com.modelproxy.role: "demo"
      com.modelproxy.version: "1.0.0"

  # 内网 PyPI 源 — 分发 feishu-relay-bot wheel 给各 bot 机器
  pypi:
    image: pypiserver/pypiserver:latest
    container_name: relay-bot-pypi
    restart: unless-stopped
    command: run -p 8080 /data/packages
    ports:
      - "${PYPI_PORT:-9080}:8080"
    volumes:
      - ./relay_bot/dist:/data/packages:ro
    labels:
      com.modelproxy.role: "pypi"

  # 本机 worker v3 — 容器化部署，restart=always + healthcheck 保证稳定
  #
  # 启动：docker compose up -d worker-local --build
  # 日志：docker compose logs -f worker-local
  # 升级：换 relay_bot/dist 里的 wheel → docker compose up -d --build worker-local
  #
  # 配置走 bind mount：relay_bot/config.yaml（不入 git，含 secret）
  worker-local:
    build:
      context: ./relay_bot
      dockerfile: Dockerfile
    image: feishu-relay-bot:3.0.0
    container_name: relay-bot-local
    restart: always

    # 不开端口；worker 只对外打 WS 出方向，没有入站监听
    network_mode: bridge

    volumes:
      - ./relay_bot/config.yaml:/etc/relay-bot/config.yaml:ro

    # 关键：自动重启 + OOM/异常时退出
    stop_grace_period: 10s

    # 资源上限 — 单 worker 实测稳态 < 80MB；给 256MB 留 3x 余量
    # 注意：docker compose v2 用顶层字段而非 deploy.resources（后者只 Swarm 生效）
    mem_limit: 256m
    mem_reservation: 64m
    cpus: 1.0

    # 日志驱动 — 按大小滚动，避免磁盘吃满
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    # 镜像里已经定义了 HEALTHCHECK，这里 docker compose 会自动遵循

    labels:
      com.modelproxy.role: "worker"
      com.modelproxy.version: "3.0.0"
