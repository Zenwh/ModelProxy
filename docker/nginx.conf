# ModelProxy Demo Nginx Configuration

server {
    listen       80;
    listen  [::]:80;
    server_name  _;
    charset      utf-8;

    # 默认根目录
    root   /usr/share/nginx/html;
    index  index.html;

    # 健康检查
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # 根路径重定向
    location = / {
        return 302 /demo/index.html;
    }

    # 子模块默认页：访问目录时自动打开 dashboard
    location = /demo/channel-console/ {
        return 302 /demo/channel-console/dashboard.html;
    }
    location = /demo/platform-admin/ {
        return 302 /demo/platform-admin/dashboard.html;
    }
    location = /demo/ {
        return 302 /demo/index.html;
    }

    # 静态资源缓存策略
    # JS / CSS / 字体 / 图片：长缓存
    location ~* \.(js|css|woff2?|eot|ttf|otf|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # Markdown：禁用缓存（便于实时改文档）
    location ~* \.md$ {
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # HTML：禁用缓存（避免改了 Demo 还看旧版）
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # 默认
    location / {
        try_files $uri $uri/ =404;
        # 关闭目录列表（避免暴露内部结构）
        autoindex off;
    }

    # 启用 gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/markdown
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # CORS（允许 PRD viewer 从浏览器 fetch markdown）
    add_header Access-Control-Allow-Origin "*";
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # 错误页
    error_page  404              /404.html;
    error_page  500 502 503 504  /50x.html;
}
